version: '3.8'

services:
  web:
    build:
      context: ./docker/php
    container_name: tiempo_php
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - tiempo_net
    environment:
      - DB_HOST=db
      - DB_USER=weather_user
      - DB_PASS=weather_pass
      - DB_NAME=tiempo_db

  nginx:
    image: nginx:alpine
    container_name: tiempo_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ${PWD}/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - tiempo_net

  db:
    image: mariadb:10.11
    container_name: tiempo_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: tiempo_db
      MYSQL_USER: weather_user
      MYSQL_PASSWORD: weather_pass
    volumes:
      - ./db/weather.sql:/docker-entrypoint-initdb.d/weather.sql
      - db_data:/var/lib/mysql
    networks:
      - tiempo_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tiempo_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: weather_user
      PMA_PASSWORD: weather_pass
    depends_on:
      - db
    networks:
      - tiempo_net

networks:
  tiempo_net:
    driver: bridge

volumes:
  db_data: